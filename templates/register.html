{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-8">
    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-lg">
        
        <!-- Logo -->
        <div class="text-center mb-6">
            <div class="text-4xl mb-2">✈️</div>
            <h1 class="text-2xl font-bold text-gray-800">Daftar Akun Baru</h1>
            <p class="text-gray-500 text-sm">Bergabung dengan program AeroMiles</p>
        </div>

        <!-- Tab Member / Staf -->
        <div class="flex mb-6 border border-gray-200 rounded-lg overflow-hidden">
            <button onclick="switchTab('member')" id="tab-member"
                class="flex-1 py-2 text-sm font-medium bg-[#0f172a] text-white transition">
                Member
            </button>
            <button onclick="switchTab('staf')" id="tab-staf"
                class="flex-1 py-2 text-sm font-medium bg-white text-gray-600 transition">
                Staf
            </button>
        </div>

        <!-- Form -->
        <div class="grid grid-cols-2 gap-4">
            <div class="col-span-2">
                <label class="block text-sm font-medium text-gray-700 mb-1">Email *</label>
                <input type="email" placeholder="email@example.com"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password *</label>
                <input type="password"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Konfirmasi Password *</label>
                <input type="password"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <p class="col-span-2 text-sm font-semibold text-gray-700">Data Pribadi</p>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Salutation *</label>
                <select class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">Pilih</option>
                    <option>Mr.</option>
                    <option>Mrs.</option>
                    <option>Ms.</option>
                    <option>Dr.</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nama Depan *</label>
                <input type="text"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nama Tengah</label>
                <input type="text"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nama Belakang *</label>
                <input type="text"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Kewarganegaraan *</label>
                <input type="text" placeholder="Indonesia"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Country Code</label>
                <input type="text" placeholder="+62"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nomor HP *</label>
                <input type="text"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Tanggal Lahir *</label>
                <input type="date"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Field khusus Staf -->
            <div class="col-span-2 hidden" id="field-staf">
                <p class="text-sm font-semibold text-gray-700 mb-2">Data Staf</p>
                <label class="block text-sm font-medium text-gray-700 mb-1">Kode Maskapai *</label>
                <select class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="">Pilih maskapai</option>
                    <option>GA - Garuda Indonesia</option>
                    <option>SQ - Singapore Airlines</option>
                    <option>MH - Malaysia Airlines</option>
                </select>
            </div>

            <div class="col-span-2">
                <button class="w-full bg-[#0f172a] text-white py-2 rounded-lg hover:bg-[#1e293b] transition">
                    Daftar
                </button>
            </div>
        </div>

    </div>
</div>

<script>
function switchTab(tab) {
    const memberTab = document.getElementById('tab-member');
    const stafTab = document.getElementById('tab-staf');
    const fieldStaf = document.getElementById('field-staf');

    if (tab === 'member') {
        memberTab.classList.add('bg-[#0f172a]', 'text-white');
        memberTab.classList.remove('bg-white', 'text-gray-600');
        stafTab.classList.add('bg-white', 'text-gray-600');
        stafTab.classList.remove('bg-[#0f172a]', 'text-white');
        fieldStaf.classList.add('hidden');
    } else {
        stafTab.classList.add('bg-[#0f172a]', 'text-white');
        stafTab.classList.remove('bg-white', 'text-gray-600');
        memberTab.classList.add('bg-white', 'text-gray-600');
        memberTab.classList.remove('bg-[#0f172a]', 'text-white');
        fieldStaf.classList.remove('hidden');
    }
}
</script>
{% endblock %}
