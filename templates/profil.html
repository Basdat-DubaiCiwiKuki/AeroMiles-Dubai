{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto">
    
    <!-- Notifikasi -->
    <div id="notif" class="hidden mb-4 px-4 py-3 rounded-lg text-sm text-white"></div>
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Pengaturan Profil</h1>

    <!-- Data Profil -->
    <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
        <h2 class="font-semibold text-gray-700 mb-4">Data Profil</h2>
        <div class="grid gap-4">
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" value="john@example.com" disabled
                    class="w-full border border-gray-200 rounded-lg px-4 py-2 bg-gray-50 text-gray-400 cursor-not-allowed">
            </div>

            <!-- Khusus Member -->
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nomor Member</label>
                    <input type="text" value="M0001" disabled
                        class="w-full border border-gray-200 rounded-lg px-4 py-2 bg-gray-50 text-gray-400 cursor-not-allowed">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Tanggal Bergabung</label>
                    <input type="text" value="2024-01-15" disabled
                        class="w-full border border-gray-200 rounded-lg px-4 py-2 bg-gray-50 text-gray-400 cursor-not-allowed">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Salutation</label>
                <select class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option>Mr.</option>
                    <option>Mrs.</option>
                    <option>Ms.</option>
                    <option>Dr.</option>
                </select>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nama Depan</label>
                    <input type="text" value="John"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nama Tengah</label>
                    <input type="text" value="William"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nama Belakang</label>
                    <input type="text" value="Doe"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Kewarganegaraan</label>
                    <input type="text" value="Indonesia"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Country Code</label>
                    <input type="text" value="+62"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Nomor HP</label>
                    <input type="text" value="81234567890"
                        class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Tanggal Lahir</label>
                <input type="date" value="1990-05-15"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <button class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition w-fit">
                Simpan Perubahan
            </button>
        </div>
    </div>

    <!-- Ubah Password -->
    <div class="bg-white rounded-xl shadow-sm p-6">
        <h2 class="font-semibold text-gray-700 mb-4">Ubah Password</h2>
        <button onclick="openModal('modal-password')"
            class="border border-gray-300 px-4 py-2 rounded-lg text-sm hover:bg-gray-50 transition">
            Ubah Password
        </button>
    </div>

</div>

<!-- Modal Ubah Password -->
<div id="modal-password" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
    <div class="bg-white rounded-xl p-6 w-full max-w-md">
        <div class="flex justify-between items-center mb-4">
            <h2 class="font-semibold text-gray-800">Ubah Password</h2>
            <button onclick="closeModal('modal-password')" class="text-gray-400 hover:text-gray-600">✕</button>
        </div>
        <div class="grid gap-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password Lama</label>
                <input type="password"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Password Baru</label>
                <input type="password"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Konfirmasi Password Baru</label>
                <input type="password"
                    class="w-full border border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button class="w-full bg-[#0f172a] text-white py-2 rounded-lg hover:bg-[#1e293b] transition">
                Simpan
            </button>
        </div>
    </div>
</div>

<script>
    function openModal(id) {
        document.getElementById(id).classList.remove('hidden');
    }
    function closeModal(id) {
        document.getElementById(id).classList.add('hidden');
    }
    
    function showNotif(pesan, warna) {
        const notif = document.getElementById('notif');
        notif.textContent = pesan;
        notif.className = `mb-4 px-4 py-3 rounded-lg text-sm text-white bg-${warna}-500`;
        notif.classList.remove('hidden');
        setTimeout(() => notif.classList.add('hidden'), 3000);
    }
    
    document.querySelector('button.bg-blue-600').addEventListener('click', function() {
        showNotif('Perubahan berhasil disimpan!', 'green');
    });
    </script>
{% endblock %}
