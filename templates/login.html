{% extends 'base.html' %}

{% block content %}
<div class="min-h-screen flex items-center justify-center">
    <div class="bg-white p-8 rounded-xl shadow-md w-full max-w-md">
        
        <!-- Logo -->
        <div class="text-center mb-6">
            <div class="text-4xl mb-2">✈️</div>
            <h1 class="text-2xl font-bold text-gray-800">Selamat Datang</h1>
            <p class="text-gray-500 text-sm">Masuk ke akun AeroMiles Anda</p>
        </div>

        <!-- Form -->
        <div class="mb-4">
            <p class="text-gray-700 font-medium mb-4">Login</p>
            <p class="text-gray-500 text-sm mb-4">Masukkan email dan password Anda</p>
            
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input type="email" placeholder="email@example.com"
                class="w-full border border-gray-300 rounded-lg px-4 py-2 mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
            
            <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
            <input type="password" placeholder="••••••••"
                class="w-full border border-gray-300 rounded-lg px-4 py-2 mb-6 focus:outline-none focus:ring-2 focus:ring-blue-500">
            
            <a href="/dashboard/">
                <button class="w-full bg-[#0f172a] text-white py-2 rounded-lg hover:bg-[#1e293b] transition">
                    Log In
                </button>
            </a>

            <p class="text-center text-sm text-gray-500 mt-4">
                Belum punya akun? <a href="/register/" class="text-blue-500 hover:underline">Daftar di sini</a>
            </p>
        </div>

    </div>
</div>
{% endblock %}
